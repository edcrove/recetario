name: CI
on:
  push:
    branches: [main, 'chore/**', 'feat/**', 'fix/**']
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: recetario_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo run lint
      - run: pnpm turbo run typecheck
      - run: pnpm turbo run test
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/recetario_test
      - run: pnpm --filter @recetario/api test:coverage
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/recetario_test
      - run: pnpm --filter @recetario/shared test:coverage
      - run: pnpm turbo run build
