name: CI
on:
  push:
    branches: [main, 'chore/**', 'feat/**', 'fix/**']
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: recetario_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo run lint
      - run: pnpm turbo run typecheck
      - run: pnpm turbo run test
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/recetario_test
      - run: pnpm --filter @recetario/api test:coverage
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/recetario_test
      - run: pnpm --filter @recetario/shared test:coverage
      - run: pnpm turbo run build
      - name: Prepare coverage pages
        run: |
          mkdir -p gh-pages/api gh-pages/shared
          cp -r packages/api/coverage/. gh-pages/api/
          cp -r packages/shared/coverage/. gh-pages/shared/
          cat <<'HTMLEOF' > gh-pages/index.html
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Recetario — Coverage Reports</title>
            <style>
              body { font-family: system-ui, sans-serif; max-width: 480px; margin: 64px auto; padding: 0 16px; color: #111 }
              h1 { font-size: 1.4rem; margin-bottom: 24px }
              ul { list-style: none; padding: 0; margin: 0 }
              li { margin-bottom: 12px }
              a { color: #2563eb; font-size: 1.05rem; text-decoration: none }
              a:hover { text-decoration: underline }
              .badge { font-size: 0.75rem; background: #f3f4f6; color: #6b7280; border-radius: 4px; padding: 2px 6px; margin-left: 6px }
            </style>
          </head>
          <body>
            <h1>Coverage Reports</h1>
            <ul>
              <li><a href="api/">@recetario/api</a><span class="badge">Backend · Integration</span></li>
              <li><a href="shared/">@recetario/shared</a><span class="badge">Domain logic</span></li>
            </ul>
          </body>
          </html>
          HTMLEOF
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: gh-pages/
          retention-days: 14
      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages
