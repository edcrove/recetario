name: CI

on:
  push:
    branches: [main, 'chore/**', 'feat/**', 'fix/**']
  pull_request:

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run ESLint (warnings = errors)
        run: pnpm turbo run lint -- --max-warnings=0

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run tsc --noEmit
        run: pnpm turbo run typecheck

  test:
    name: Tests
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: recetario_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @recetario/shared build

      - name: Run unit & integration tests
        id: tests
        run: |
          set -o pipefail
          pnpm turbo run test 2>&1 | tee test-output.txt
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/recetario_test

      - name: Run screen component tests (Vitest + jsdom)
        run: pnpm --filter recetario-app test:screens

      - name: Parse test results
        if: always()
        id: summary
        run: |
          {
            echo "report<<SUMMARY_EOF"
            echo "### Test Results"
            echo ""
            echo "| Package | Files | Tests | Status |"
            echo "|---------|-------|-------|--------|"
            # Extract per-package results from turbo output
            for pkg in "@recetario/shared" "@recetario/api" "@recetario/mcp" "recetario-app"; do
              # Find the "Test Files" line after the package name
              files=$(grep -A 50 "${pkg}:test:" test-output.txt | grep "Test Files" | tail -1 | sed 's/.*  //' || echo "—")
              tests=$(grep -A 50 "${pkg}:test:" test-output.txt | grep "      Tests" | tail -1 | sed 's/.*  //' || echo "—")
              if echo "$files" | grep -q "passed"; then
                status="✅"
              elif echo "$files" | grep -q "failed"; then
                status="❌"
              else
                status="⏭️"
              fi
              echo "| \`${pkg}\` | ${files} | ${tests} | ${status} |"
            done
            echo ""
            # Overall summary
            total_passed=$(grep -c "✓" test-output.txt || true)
            total_failed=$(grep -c "✗\|FAIL" test-output.txt || true)
            if [ "$total_failed" -gt 0 ]; then
              echo "**Overall: ❌ Some tests failed**"
            else
              echo "**Overall: ✅ All tests passed**"
            fi
            echo ""
            echo "SUMMARY_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Comment test results on PR
        if: always() && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: test-results
          message: |
            ${{ steps.summary.outputs.report }}

            📊 [Full coverage report](https://${{ github.repository_owner }}.github.io/recetario/) · [CI run details](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

  coverage:
    name: Coverage Report
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: recetario_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @recetario/shared build

      - name: Generate API unit coverage
        run: pnpm --filter @recetario/api test:coverage
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/recetario_test

      - name: Generate API integration coverage (real DB)
        run: pnpm --filter @recetario/api test:integration-coverage
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/recetario_test
        continue-on-error: true

      - name: Generate shared coverage
        run: pnpm --filter @recetario/shared test:coverage

      - name: Generate MCP coverage
        run: pnpm --filter @recetario/mcp test:coverage

      - name: Generate app utils coverage
        run: pnpm --filter recetario-app test:coverage

      - name: Run screen component tests in coverage job
        run: pnpm --filter recetario-app test:screens

      - name: Prepare coverage pages
        run: |
          mkdir -p gh-pages/api gh-pages/shared
          cp -r packages/api/coverage/. gh-pages/api/
          cp -r packages/shared/coverage/. gh-pages/shared/
          cat <<'HTMLEOF' > gh-pages/index.html
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Recetario — Coverage Reports</title>
            <style>
              body { font-family: system-ui, sans-serif; max-width: 480px; margin: 64px auto; padding: 0 16px; color: #111 }
              h1 { font-size: 1.4rem; margin-bottom: 24px }
              ul { list-style: none; padding: 0; margin: 0 }
              li { margin-bottom: 12px }
              a { color: #2563eb; font-size: 1.05rem; text-decoration: none }
              a:hover { text-decoration: underline }
              .badge { font-size: 0.75rem; background: #f3f4f6; color: #6b7280; border-radius: 4px; padding: 2px 6px; margin-left: 6px }
            </style>
          </head>
          <body>
            <h1>Coverage Reports</h1>
            <ul>
              <li><a href="api/">@recetario/api</a><span class="badge">Backend · Integration</span></li>
              <li><a href="shared/">@recetario/shared</a><span class="badge">Domain logic</span></li>
            </ul>
          </body>
          </html>
          HTMLEOF

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: gh-pages/
          retention-days: 14

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages

  build:
    name: Build
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build all packages
        run: pnpm turbo run build

  e2e:
    name: E2E Tests (Playwright)
    needs: [build]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: recetario
          POSTGRES_PASSWORD: recetario
          POSTGRES_DB: recetario
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm --filter @recetario/shared build

      - name: Apply DB migrations
        run: pnpm --filter @recetario/api exec drizzle-kit migrate
        env:
          DATABASE_URL: postgres://recetario:recetario@localhost:5432/recetario

      - name: Start API in background
        run: |
          nohup pnpm --filter @recetario/api start &
          echo "Waiting for API..."
          timeout 30 bash -c 'until curl -sf http://localhost:3000/health; do sleep 1; done'
        env:
          DATABASE_URL: postgres://recetario:recetario@localhost:5432/recetario
          JWT_SECRET: ci-e2e-secret-not-for-production
          NODE_ENV: production
          PORT: 3000

      - name: Seed demo user and recipes
        run: |
          TOKEN=$(curl -s -X POST http://localhost:3000/auth/register \
            -H "Content-Type: application/json" \
            -d '{"email":"e2e@recetario.app","password":"e2etest1234","displayName":"E2E User"}' | \
            node -e "process.stdin.resume();let b='';process.stdin.on('data',d=>b+=d);process.stdin.on('end',()=>console.log(JSON.parse(b).token))")
          echo "E2E_TOKEN=$TOKEN" >> "$GITHUB_ENV"
        env:
          DATABASE_URL: postgres://recetario:recetario@localhost:5432/recetario

      - name: Build Expo web app (standard)
        run: pnpm --filter recetario-app build
        env:
          EXPO_PUBLIC_API_URL: http://localhost:3000

      - name: Build Expo web app (instrumented for E2E coverage)
        run: BABEL_ENV=coverage pnpm --filter recetario-app exec expo export --platform web --output-dir dist-coverage
        env:
          EXPO_PUBLIC_API_URL: http://localhost:3000

      - name: Serve instrumented app for E2E coverage
        run: |
          npx serve dist-coverage --listen 8090 &
          sleep 3
          curl -sf http://localhost:8090 > /dev/null
        working-directory: apps/app

      - name: Install Playwright browsers
        run: pnpm --filter recetario-app exec playwright install chromium --with-deps

      - name: Run E2E smoke tests (standard build)
        run: pnpm --filter recetario-app exec playwright test e2e/smoke.spec.ts
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:8080
          EXPO_PUBLIC_API_URL: http://localhost:3000
          E2E_EMAIL: e2e@recetario.app
          E2E_PASSWORD: e2etest1234

      - name: Run E2E tests with coverage (instrumented build)
        run: pnpm --filter recetario-app exec playwright test e2e/smoke.spec.ts e2e/auth.spec.ts e2e/recipes.spec.ts e2e/menu.spec.ts e2e/cook-mode.spec.ts
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:8090
          EXPO_PUBLIC_API_URL: http://localhost:3000
          E2E_EMAIL: e2e@recetario.app
          E2E_PASSWORD: e2etest1234
          E2E_COVERAGE: 'true'

      - name: Generate E2E coverage report
        if: always()
        run: |
          cd apps/app
          npx nyc merge .e2e-coverage .nyc_output/out.json
          node e2e/remap-coverage.js
          npx nyc report --reporter=text --reporter=lcov --reporter=json-summary
        continue-on-error: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/app/playwright-report/
          retention-days: 7

      - name: Upload E2E coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-coverage-report
          path: apps/app/coverage-e2e/
          retention-days: 14

  ci:
    name: CI Gate
    if: always()
    needs: [lint, typecheck, test, build, coverage, e2e]
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs passed
        run: |
          results=("${{ needs.lint.result }}" "${{ needs.typecheck.result }}" "${{ needs.test.result }}" "${{ needs.build.result }}" "${{ needs.coverage.result }}")
          for r in "${results[@]}"; do
            if [ "$r" != "success" ]; then
              echo "Job failed with result: $r"
              exit 1
            fi
          done
          echo "All jobs passed"
