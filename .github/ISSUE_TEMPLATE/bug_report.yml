name: Bug report
description: Something isn't working as expected
labels: [bug]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options: [API, MCP, App, Shared, Infra, CI]
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Call endpoint ...
        2. With payload ...
        3. See error ...
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context (logs, screenshots, env)
