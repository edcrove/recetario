name: Feature request
description: Propose a new feature or improvement
labels: [enhancement]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options: [API, MCP, App, Shared, Infra, CI, Docs]
    validations:
      required: true

  - type: textarea
    id: user_story
    attributes:
      label: User story
      placeholder: "As a [role], I want [feature], so that [benefit]."
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context or alternatives considered
