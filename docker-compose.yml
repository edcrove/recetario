services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: recetario
      POSTGRES_USER: recetario
      POSTGRES_PASSWORD: recetario
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U recetario -d recetario']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgres://recetario:recetario@postgres:5432/recetario
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-use-64-random-hex-chars}
      NODE_ENV: production
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy

  app:
    build:
      context: .
      dockerfile: apps/app/Dockerfile
      args:
        EXPO_PUBLIC_API_URL: ${EXPO_PUBLIC_API_URL:-http://localhost:3000}
    ports:
      - '8080:80'
    depends_on:
      - api

volumes:
  pgdata:
