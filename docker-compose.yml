services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: recetario
      POSTGRES_USER: recetario
      POSTGRES_PASSWORD: recetario
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U recetario -d recetario']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgres://recetario:recetario@postgres:5432/recetario
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-use-64-random-hex-chars}
      NODE_ENV: production
      PORT: 3000
      # Higher than the production default (100) — local/E2E runs several
      # parallel demo accounts hitting /v1/recipes within the same window.
      RATE_LIMIT_MAX_REQUESTS: '1000'
    depends_on:
      postgres:
        condition: service_healthy

  app:
    build:
      context: .
      dockerfile: apps/app/Dockerfile
      args:
        EXPO_PUBLIC_API_URL: ${EXPO_PUBLIC_API_URL:-http://localhost:3000}
    ports:
      - '8080:80'
    depends_on:
      - api

  # Instrumented build for E2E coverage measurement (babel-plugin-istanbul)
  # Usage: docker compose --profile coverage up -d app-coverage
  app-coverage:
    profiles: ['coverage']
    build:
      context: .
      dockerfile: apps/app/Dockerfile.coverage
      args:
        EXPO_PUBLIC_API_URL: ${EXPO_PUBLIC_API_URL:-http://localhost:3000}
    ports:
      - '8090:80'
    depends_on:
      - api

  # ---------------------------------------------------------------------------
  # Isolated E2E stack (profile: e2e) — its own Postgres server, API and app on
  # separate ports so automated E2E runs never touch the manual/demo data on
  # the default stack. Bring up: docker compose --profile e2e up -d
  # ---------------------------------------------------------------------------
  postgres-e2e:
    profiles: ['e2e']
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: recetario_e2e
      POSTGRES_USER: recetario
      POSTGRES_PASSWORD: recetario
    ports:
      - '5433:5432'
    volumes:
      - pgdata-e2e:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U recetario -d recetario_e2e']
      interval: 5s
      timeout: 5s
      retries: 10

  api-e2e:
    profiles: ['e2e']
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    ports:
      - '3001:3000'
    environment:
      DATABASE_URL: postgres://recetario:recetario@postgres-e2e:5432/recetario_e2e
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-use-64-random-hex-chars}
      NODE_ENV: production
      PORT: 3000
      RATE_LIMIT_MAX_REQUESTS: '1000'
    depends_on:
      postgres-e2e:
        condition: service_healthy

  app-e2e:
    profiles: ['e2e']
    build:
      context: .
      dockerfile: apps/app/Dockerfile
      args:
        EXPO_PUBLIC_API_URL: http://localhost:3001
    ports:
      - '8081:80'
    depends_on:
      - api-e2e

volumes:
  pgdata:
  pgdata-e2e:
